<!DOCTYPE html>
<html lang="nl" id="html">
<head>
  <meta charset="UTF-8" /><meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Betaling Geslaagd – Spanvloeren.nl</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" /><link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Barlow+Condensed:ital,wght@0,400;0,600;0,700;0,800;0,900;1,700&family=Barlow:wght@300;400;500;600&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="/assets/css/style.css?v=25" />
  <style>#cart-float-btn,#float-cta{display:none!important}</style>
</head>
<body class="subpage">
<div id="nav-placeholder"></div>

<section class="section" style="min-height:60vh;display:flex;align-items:center">
  <div class="wrap" style="text-align:center;max-width:560px;margin:0 auto">
    <div class="checkout-success show" id="success-block">
      <div class="checkout-success-icon">
        <svg width="36" height="36" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true"><polyline points="20 6 9 17 4 12"/></svg>
      </div>
      <h2 data-i18n="checkout.successTitle">Betaling Geslaagd!</h2>
      <p id="success-msg">Bedankt voor je bestelling. Je ontvangt een bevestiging per e-mail.<br>Vragen? Bel ons op <a href="tel:+31683296802" style="color:var(--red);font-weight:600">06 832 968 02</a>.</p>
      <p id="order-ref" style="font-size:13px;color:var(--muted);margin-top:8px"></p>
      <a href="/producten.html" class="btn btn-red" style="margin-top:24px" data-i18n="checkout.successBtn">Terug naar producten</a>
    </div>
    <div class="checkout-success" id="cancelled-block" style="display:none">
      <div class="checkout-success-icon" style="background:#fff3cd;color:#856404">
        <svg width="36" height="36" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true"><path d="M10.29 3.86L1.82 18a2 2 0 001.71 3h16.94a2 2 0 001.71-3L13.71 3.86a2 2 0 00-3.42 0z"/><line x1="12" y1="9" x2="12" y2="13"/><line x1="12" y1="17" x2="12.01" y2="17"/></svg>
      </div>
      <h2>Betaling Geannuleerd</h2>
      <p>Uw betaling is niet afgerond. U kunt het opnieuw proberen.</p>
      <a href="/checkout.html" class="btn btn-red" style="margin-top:24px">Opnieuw proberen</a>
    </div>
  </div>
</section>

<div id="footer-placeholder"></div>
<script src="/assets/js/i18n.js?v=25"></script>
<script src="/assets/js/main.js?v=25"></script>
<script src="/assets/js/cart.js?v=24"></script>
<script>
(function () {
  var params = new URLSearchParams(window.location.search);
  var order  = params.get('order');

  if (order) {
    document.getElementById('order-ref').textContent = 'Bestelnummer: ' + order;
    localStorage.removeItem('miral-cart');
  }
})();
</script>
</body>
</html>
